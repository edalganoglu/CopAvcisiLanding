<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Çöp Avcısı — ödeme sonrası uygulamaya dönüş."/>
<meta name="robots" content="noindex, nofollow"/>
<title>Ödeme tamamlandı — Çöp Avcısı</title>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/site.css"/>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<nav class="fixed top-0 w-full z-50 glass-nav shadow-sm" aria-label="Ana menü">
<div class="flex flex-wrap justify-between items-center gap-4 px-6 py-4 max-w-7xl mx-auto">
<a href="index.html" class="flex items-center gap-2">
<img src="assets/logo.png" width="40" height="40" alt="Çöp Avcısı" class="rounded-2xl shadow-md"/>
<span class="text-xl font-black tracking-tighter text-green-900">ÇÖP AVCISI</span>
</a>
<div class="flex flex-wrap gap-4 md:gap-6 items-center text-sm md:text-base">
<a class="text-green-800 font-bold hover:underline link-inline" href="index.html">Ana sayfa</a>
</div>
</div>
</nav>
<main class="pt-28 pb-24 px-6 max-w-lg mx-auto text-center">
<div class="card-legal bg-surface-container-lowest rounded-[2rem] p-8 md:p-10 shadow-lg border border-outline-variant/20">
<span class="material-symbols-outlined text-5xl text-primary mb-4 inline-block" aria-hidden="true">payments</span>
<h1 class="text-2xl md:text-3xl font-bold text-primary tracking-tight mb-3">Uygulamaya dönülüyor</h1>
<p id="sub" class="text-slate-600 dark:text-slate-400 text-[15px] leading-relaxed mb-8">Ödeme işlemi bittiyse Çöp Avcısı uygulaması açılmalı. Açılmazsa aşağıdaki düğmeye dokunun.</p>
<a id="open-app" class="inline-flex items-center justify-center gap-2 bg-primary text-on-primary px-8 py-3.5 rounded-xl font-bold hover:opacity-95 transition-opacity shadow-md w-full sm:w-auto" href="#">Uygulamayı aç</a>
<p class="mt-8 text-sm text-slate-500"><a class="text-primary font-semibold underline link-inline" href="index.html">Ana sayfaya dön</a></p>
</div>
</main>
<script>
(function () {
  var q = window.location.search || "";
  var h = window.location.hash || "";
  var target = "copavcisi://billing-return" + q + h;
  var sub = document.getElementById("sub");
  var params = new URLSearchParams(window.location.search);
  var st = params.get("status");
  if (st === "fail" && sub) {
    sub.textContent =
      "Ödeme tamamlanamadıysa uygulamaya dönüp durumu kontrol edebilirsiniz. Açılmazsa aşağıdaki düğmeyi kullanın.";
  }
  var link = document.getElementById("open-app");
  if (link) link.setAttribute("href", target);
  window.location.replace(target);
})();
</script>
</body>
</html>
