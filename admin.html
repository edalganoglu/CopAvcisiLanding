<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="description" content="Çöp Avcısı — admin onay paneli."/>
<title>Admin — Çöp Avcısı</title>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/site.css"/>
<style>
  .hidden-important { display: none !important; }
  .toast { animation: toastIn 0.2s ease-out; }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #006438; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<nav class="fixed top-0 w-full z-40 glass-nav shadow-sm" aria-label="Ana menü">
  <div class="flex flex-wrap justify-between items-center gap-4 px-6 py-4 max-w-7xl mx-auto">
    <a href="index.html" class="flex items-center gap-2">
      <img src="assets/logo.png" width="40" height="40" alt="Çöp Avcısı" class="rounded-2xl shadow-md"/>
      <span class="text-xl font-black tracking-tighter text-green-900">ÇÖP AVCISI</span>
    </a>
    <div class="flex items-center gap-3 text-sm">
      <span class="hidden sm:inline-block px-3 py-1 rounded-full bg-primary/10 text-primary font-semibold text-xs tracking-wide">ADMIN PANEL</span>
      <button id="logoutBtn" class="hidden-important text-slate-700 hover:text-red-600 font-semibold text-sm px-3 py-1.5 rounded-full border border-slate-300 hover:border-red-300 transition-colors">
        Çıkış
      </button>
    </div>
  </div>
</nav>

<main class="pt-28 pb-24 px-6 max-w-5xl mx-auto">

  <!-- Login view -->
  <section id="loginView" class="card-legal bg-white border border-slate-200 rounded-[2rem] p-8 md:p-12 max-w-md mx-auto shadow-sm">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">lock</span>
      </div>
      <div>
        <h1 class="text-xl font-bold text-on-surface tracking-tight">Admin girişi</h1>
        <p class="text-xs text-slate-600">Bekleyen raporları onaylamak için şifre gerekli.</p>
      </div>
    </div>
    <form id="loginForm" class="space-y-4">
      <label class="block">
        <span class="block text-xs font-semibold text-slate-700 mb-1.5 uppercase tracking-wide">Şifre</span>
        <input id="pwdInput" type="password" autocomplete="current-password" required
               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"/>
      </label>
      <button type="submit" id="loginBtn"
              class="w-full bg-primary text-white font-bold py-3 rounded-xl hover:bg-primary-container transition-colors">
        Giriş yap
      </button>
      <p id="loginError" class="text-sm text-red-600 hidden"></p>
    </form>
  </section>

  <!-- App view -->
  <section id="appView" class="hidden-important">
    <header class="mb-8 flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Bekleyen raporlar</p>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-[-0.02em] text-on-surface">
          Onay bekleyen <span id="countBadge" class="text-primary">0</span>
        </h1>
        <p class="text-sm text-slate-600 mt-2">Onaylananlara belediye e-postası gider. Reddedilenler arşive taşınır.</p>
      </div>
      <button id="refreshBtn"
              class="inline-flex items-center gap-2 bg-white border border-slate-300 text-slate-700 font-semibold px-4 py-2 rounded-full hover:bg-slate-50 text-sm">
        <span class="material-symbols-outlined text-base">refresh</span> Yenile
      </button>
    </header>

    <div id="listState" class="text-center py-12 text-slate-500 text-sm hidden">
      <span class="spinner"></span>
      <p class="mt-3">Yükleniyor…</p>
    </div>

    <div id="emptyState" class="hidden text-center py-16 bg-white rounded-2xl border border-dashed border-slate-300">
      <span class="material-symbols-outlined text-6xl text-slate-300">inbox</span>
      <p class="mt-2 text-slate-600 font-semibold">Bekleyen rapor yok.</p>
      <p class="text-xs text-slate-500 mt-1">Yeni raporlar burada otomatik listelenir.</p>
    </div>

    <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-2xl p-4 text-sm text-red-800"></div>

    <ul id="reportsList" class="space-y-4"></ul>
  </section>

</main>

<div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// --- Configuration ---------------------------------------------------------
// Supabase project ref is baked in; only the shared admin password varies.
const SUPABASE_URL = 'https://jxmorcxbzsdsrylrqsbz.supabase.co';
const ADMIN_FN_URL = `${SUPABASE_URL}/functions/v1/admin-reports`;
const PHOTO_FALLBACK = 'assets/logo.png';
const PWD_KEY = 'copavcisi_admin_pwd';

// ---------------------------------------------------------------------------

const $ = (id) => document.getElementById(id);
const loginView = $('loginView');
const appView = $('appView');
const logoutBtn = $('logoutBtn');
const loginForm = $('loginForm');
const loginError = $('loginError');
const pwdInput = $('pwdInput');
const loginBtn = $('loginBtn');
const listState = $('listState');
const emptyState = $('emptyState');
const errorState = $('errorState');
const reportsList = $('reportsList');
const countBadge = $('countBadge');
const refreshBtn = $('refreshBtn');

function showView(name) {
  if (name === 'login') {
    loginView.classList.remove('hidden-important');
    appView.classList.add('hidden-important');
    logoutBtn.classList.add('hidden-important');
  } else {
    loginView.classList.add('hidden-important');
    appView.classList.remove('hidden-important');
    logoutBtn.classList.remove('hidden-important');
  }
}

function toast(message, type = 'info') {
  const container = $('toastContainer');
  const el = document.createElement('div');
  const base = 'toast px-4 py-3 rounded-xl shadow-lg text-sm font-medium max-w-sm';
  const variant = type === 'error'
    ? 'bg-red-600 text-white'
    : type === 'success'
      ? 'bg-primary text-white'
      : 'bg-slate-800 text-white';
  el.className = `${base} ${variant}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 320);
  }, 3600);
}

async function callAdmin(action, extra = {}) {
  const pwd = sessionStorage.getItem(PWD_KEY);
  if (!pwd) throw new Error('Şifre bulunamadı.');
  const res = await fetch(ADMIN_FN_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Password': pwd,
    },
    body: JSON.stringify({ action, ...extra }),
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
  if (res.status === 401) {
    sessionStorage.removeItem(PWD_KEY);
    showView('login');
    throw new Error('Yetkisiz. Tekrar giriş yapın.');
  }
  if (!res.ok) {
    const msg = (data && (data.error || data.details)) || `HTTP ${res.status}`;
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
  }
  return data;
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString('tr-TR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch { return iso; }
}

function categoryLabel(cat) {
  switch (cat) {
    case 'garbage': return 'Çöp';
    case 'broken_road': return 'Bozuk Yol';
    default: return cat || '-';
  }
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function renderReports(reports) {
  reportsList.innerHTML = '';
  countBadge.textContent = String(reports.length);

  if (reports.length === 0) {
    emptyState.classList.remove('hidden');
    return;
  }
  emptyState.classList.add('hidden');

  for (const r of reports) {
    const photoUrl = Array.isArray(r.photo_urls) && r.photo_urls[0]
      ? r.photo_urls[0] : PHOTO_FALLBACK;
    const muni = r.municipalities || {};
    const muniLabel = muni.name
      ? `${muni.name}${muni.email ? ` · ${muni.email}` : ''}`
      : 'Belediye atanmamış';

    const li = document.createElement('li');
    li.className = 'bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm';
    li.dataset.reportId = r.id;
    li.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-[200px_1fr] gap-0">
        <a href="${escapeHtml(photoUrl)}" target="_blank" rel="noopener"
           class="block bg-slate-100 md:h-full h-48 overflow-hidden">
          <img src="${escapeHtml(photoUrl)}" alt="Rapor fotoğrafı"
               class="w-full h-full object-cover" loading="lazy"
               onerror="this.src='${PHOTO_FALLBACK}'"/>
        </a>
        <div class="p-5">
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <span class="inline-block px-2.5 py-0.5 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-wide">
              ${escapeHtml(categoryLabel(r.category))}
            </span>
            <span class="text-xs text-slate-500">${escapeHtml(formatDate(r.created_at))}</span>
          </div>
          <p class="text-sm font-semibold text-on-surface mb-1">
            ${escapeHtml(r.district || '-')}, ${escapeHtml(r.city || '-')}
          </p>
          <p class="text-sm text-slate-700 mb-2">${escapeHtml(r.address || '-')}</p>
          <p class="text-sm text-slate-600 italic mb-3">
            ${r.description ? `"${escapeHtml(r.description)}"` : '<span class="text-slate-400">Açıklama yok</span>'}
          </p>
          <p class="text-xs text-slate-500 mb-4">
            <span class="font-semibold">Hedef:</span> ${escapeHtml(muniLabel)}
          </p>
          <div class="flex flex-wrap gap-2">
            <button data-action="approve"
                    class="inline-flex items-center gap-2 bg-primary text-white font-bold px-4 py-2 rounded-full text-sm hover:bg-primary-container transition-colors disabled:opacity-50">
              <span class="material-symbols-outlined text-base">check_circle</span>
              Onayla ve Mail Gönder
            </button>
            <button data-action="reject"
                    class="inline-flex items-center gap-2 bg-white border border-red-300 text-red-700 font-bold px-4 py-2 rounded-full text-sm hover:bg-red-50 transition-colors disabled:opacity-50">
              <span class="material-symbols-outlined text-base">cancel</span>
              Reddet
            </button>
          </div>
        </div>
      </div>
    `;
    reportsList.appendChild(li);
  }
}

async function loadReports() {
  errorState.classList.add('hidden');
  emptyState.classList.add('hidden');
  listState.classList.remove('hidden');
  reportsList.innerHTML = '';
  try {
    const data = await callAdmin('list');
    listState.classList.add('hidden');
    renderReports(data.reports || []);
  } catch (err) {
    listState.classList.add('hidden');
    errorState.textContent = `Liste yüklenemedi: ${err.message}`;
    errorState.classList.remove('hidden');
  }
}

async function handleAction(reportId, action, card) {
  const buttons = card.querySelectorAll('button');
  buttons.forEach((b) => (b.disabled = true));
  try {
    const data = await callAdmin(action, { report_id: reportId });
    if (action === 'approve') {
      if (data.email_sent) {
        toast('Onaylandı ve mail gönderildi.', 'success');
      } else {
        toast('Onaylandı, ancak mail gönderilemedi. Ayrıntı için konsola bakın.', 'error');
        console.warn('notify failed', data);
      }
    } else {
      toast('Rapor reddedildi.', 'info');
    }
    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.97)';
    setTimeout(() => {
      card.remove();
      const remaining = reportsList.children.length;
      countBadge.textContent = String(remaining);
      if (remaining === 0) emptyState.classList.remove('hidden');
    }, 300);
  } catch (err) {
    toast(`Hata: ${err.message}`, 'error');
    buttons.forEach((b) => (b.disabled = false));
  }
}

// --- Event bindings --------------------------------------------------------
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.classList.add('hidden');
  const pwd = pwdInput.value.trim();
  if (!pwd) return;
  loginBtn.disabled = true;
  loginBtn.textContent = 'Kontrol ediliyor…';
  sessionStorage.setItem(PWD_KEY, pwd);
  try {
    await callAdmin('ping');
    pwdInput.value = '';
    showView('app');
    loadReports();
  } catch (err) {
    sessionStorage.removeItem(PWD_KEY);
    loginError.textContent = err.message || 'Giriş başarısız.';
    loginError.classList.remove('hidden');
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'Giriş yap';
  }
});

logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem(PWD_KEY);
  showView('login');
});

refreshBtn.addEventListener('click', () => loadReports());

reportsList.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = btn.closest('li[data-report-id]');
  if (!card) return;
  const action = btn.dataset.action;
  const reportId = card.dataset.reportId;
  if (action === 'reject' && !confirm('Bu raporu reddetmek istediğine emin misin? Mail gönderilmeyecek.')) return;
  if (action === 'approve' && !confirm('Onaylayıp belediyeye mail gönderilsin mi?')) return;
  handleAction(reportId, action, card);
});

// --- Boot ------------------------------------------------------------------
(async function init() {
  const stored = sessionStorage.getItem(PWD_KEY);
  if (!stored) {
    showView('login');
    return;
  }
  try {
    await callAdmin('ping');
    showView('app');
    loadReports();
  } catch {
    showView('login');
  }
})();
</script>
</body>
</html>
